# Reusable PR review workflow.
#
# Location: your-org/.github/.github/workflows/pr-review.yml
#            ─────────────────
#            This is GitHub's special org-wide repo.
#            Any repo in the org can call workflows defined here.
#
# Caller repos only need a thin workflow file:
#
#   on:
#     pull_request:
#       types: [opened, synchronize]
#   jobs:
#     review:
#       uses: your-org/.github/.github/workflows/pr-review.yml@main
#       secrets:
#         claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#
# Prerequisites (one-time, org-level):
#   1. Install the Claude GitHub App on the org.
#   2. Add CLAUDE_CODE_OAUTH_TOKEN as an org-level secret
#      (Settings → Secrets → Actions → New organization secret),
#      scoped to "All repositories" or selected repos.
#   3. Configure branch protection rulesets at the org level:
#      - Require PR reviews before merging (1 human approval minimum)
#      - Require status checks: "code-review" and "security-review"

name: PR Review

on:
  workflow_call:
    secrets:
      claude-oauth-token:
        description: Claude Code OAuth token
        required: true

jobs:
  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: read
      statuses: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets['claude-oauth-token'] }}
          allowed_tools: |
            Bash(gh pr view*),Bash(gh pr diff*),Bash(gh pr comment*),Bash(gh pr list*),Bash(gh pr checks*),Bash(gh api repos/**),Bash(git log*),Bash(git diff*),Bash(git blame*),Bash(git show*),Bash(grep*),Bash(find*),Bash(cat*),Bash(ls*),Bash(head*),Bash(tail*),Read,Glob,Grep
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Focus on:

            1. **Correctness**: Does the code do what the PR description claims?
            2. **Spec compliance**: Does the change align with SPEC.md? Flag any
               drift (added scope, missing requirements, changed behavior).
            3. **Code quality**: Naming, structure, duplication, error handling.
            4. **Test coverage**: Are new code paths tested? Are edge cases covered?
            5. **Performance**: Obvious regressions (N+1 queries, missing indexes,
               synchronous I/O in hot paths, unbounded loops).
            6. **Breaking changes**: API contract changes, migration needs,
               backwards compatibility.

            The repository is already checked out locally. Prefer reading files
            directly (cat, grep, Read tool) over gh api calls where possible.

            Use `gh pr comment` to post all findings. Reference file paths and
            line numbers in the comment body.

            When querying PR details, note that `gh pr view --json` uses
            `reviewRequests` (not `reviewers`) for pending review requests.

            Do NOT approve or request changes — just comment with findings.
            The security-review job handles security. Do not duplicate that work.
          show_full_output: 'true'
          claude_args: |
            --max-turns 10
            --model claude-sonnet-4-6

  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets['claude-oauth-token'] }}
          allowed_tools: |
            Bash(gh pr view*),Bash(gh pr diff*),Bash(gh pr comment*),Bash(gh api repos/**),Bash(git log*),Bash(git diff*),Bash(git blame*),Bash(git show*),Bash(grep*),Bash(find*),Bash(cat*),Bash(ls*),Bash(head*),Bash(tail*),Read,Glob,Grep
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a security-focused review of this pull request. Check for:

            1. **Authentication / Authorization**: Missing auth checks, insecure
               direct object references (IDOR), privilege escalation, JWT/session
               handling mistakes.
            2. **Injection**: SQL injection (raw queries, string formatting in
               queries), command injection (subprocess with user input), SSTI,
               path traversal.
            3. **XSS**: Unescaped user-controlled data rendered as HTML, unsafe
               innerHTML/dangerouslySetInnerHTML, missing Content-Type headers.
            4. **Secrets and credentials**: Hardcoded API keys, passwords, tokens,
               or private keys in source; secrets logged or returned in responses.
            5. **Input validation**: Missing or bypassable validation on
               user-controlled fields, file uploads, URL parameters.
            6. **LLM-specific**: Prompt injection, system prompt leakage, tool
               call validation gaps, unvalidated LLM output rendered as HTML.
            7. **Dependency risks**: New packages with known CVEs or suspicious
               provenance.
            8. **Cryptography**: Weak algorithms (MD5, SHA1 for security), insecure
               randomness, improper key management.

            The repository is already checked out locally. Prefer reading files
            directly (cat, grep, Read tool) over gh api calls where possible.

            Use `gh pr comment` to post all findings, labelled by severity
            (Critical / High / Medium / Low). Reference file paths and line numbers.

            Do NOT approve or request changes — just comment with findings.
          show_full_output: 'true'
          claude_args: |
            --max-turns 10
            --model claude-sonnet-4-6

  auto-approve:
    name: Auto-Approve (if clean)
    runs-on: ubuntu-latest
    needs: [code-review, security-review]
    if: success()
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: [
                '✅ **Automated review passed.**',
                '',
                '- Code review: no blocking issues found',
                '- Security review: no vulnerabilities detected',
                '',
                'A human approval is still required before this PR can be merged.',
              ].join('\n'),
            });
